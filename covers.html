<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    The latest code can be found here: https://github.com/wirtes/alcast-artwork
    
    Download it. Customize it. Make it yours. Make it better.
    
    HOW TO REUSE THIS PAGE

    This file is a self-contained Mastodon artwork wall. You can drop it onto a
    normal web server and use it as-is, or adapt it for your own station,
    playlist, or art feed.

    The main things you will usually want to customize are:

    1. STATION_CONFIGS
       This is the primary configuration object in the script section below.
       Each entry represents one feed source that the page can display.

       For each station you can define:
       - acct:
         The Mastodon account identifier used for account lookup.
       - profileUrl:
         The public Mastodon profile URL for RSS fallback.
       - title:
         The full browser page title.
       - station_label:
         The shorter label used in the temporary top banner.
       - strip_trailing_hashtags:
         Set to true only if that feed tends to append hashtag-only blocks that
         should be removed from the overlay text.

       If you want to support your own feed, copy one of the existing station
       entries and replace those values with your own in the getStationKey() 
       function.

    2. URL behavior
       This page currently reads the "station" query parameter and selects one
       entry from STATION_CONFIGS. If the parameter is omitted or invalid, it
       falls back to the default station.
       
       To change the default station, update the fallback value inside the
       getStationKey() function.

       Example:
       covers.html?station=kvcu

       If you only want one station and do not need switching, you can simplify
       the code by removing the other entries and hard-coding the config lookup.

    3. Visual sizing
       Tile sizing is controlled by the layout helpers in the script and the
       CSS variables near the top of this file. Mobile, tablet, and desktop are
       intentionally handled differently so the artwork wall stays readable.

    4. Overlay behavior
       Clicking or tapping artwork opens a lightbox that shows the original
       image as large as possible inside the browser window, with the related
       Mastodon post text displayed underneath. The interaction is wired in
       JavaScript, and the look of the overlay is styled in the CSS rules for
       #lightbox-overlay and its child elements.

    5. Banner behavior
       The temporary title banner shown near the top of the page is styled by
       #title-banner and uses station_label for its displayed text.

    HOW THE PAGE WORKS

    - It looks up the selected Mastodon account using the public Mastodon API.
    - It fetches public posts from that account.
    - It keeps only posts with image attachments.
    - It builds a tiled wall of square covers.
    - It refreshes periodically to check for newly posted artwork, but only 
      redraws the page when new artwork is found.
    - It will also load older artwork as the viewer scrolls down.

    DEPLOYMENT NOTES

    - This page is intended to be served over HTTP/HTTPS from a web server.
    - Some browsers may block direct API access from file:// URLs.
    - For local testing, run a simple web server such as:
        python3 -m http.server 8000

    SAFE CUSTOMIZATION ADVICE

    If you are new to this file, the safest places to make edits are:
    - the STATION_CONFIGS object
    - The fallback value inside the getStationKey() function

    If you change the data-loading functions, test carefully because the feed
    refresh, infinite scroll, and first-display animation logic all depend on
    those functions staying in sync.
  -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alcast Covers</title>
  <style>
    :root {
      --tile-size: 250px;
      --flip-duration: 450ms;
      --bg: #050505;
      --title-banner-height: 84px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      background: var(--bg);
      font-family: Helvetica, Arial, sans-serif;
    }

    html {
      scrollbar-width: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    body {
      position: relative;
      scrollbar-width: none;
    }

    #wall {
      position: relative;
      display: grid;
      transform-origin: top left;
      perspective: 1200px;
    }

    .tile {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      padding: 0;
      margin: 0;
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      touch-action: manipulation;
      cursor: pointer;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0)),
        #111;
      backface-visibility: hidden;
      transform-origin: center center;
      will-change: transform, opacity;
    }

    .tile.pending {
      opacity: 0;
    }

    .tile img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: left top;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .tile.flip {
      animation: flip-in var(--flip-duration) linear both;
    }

    .tile.jiggle img {
      animation: pulse 320ms linear 1 both;
    }

    #lightbox-overlay {
      position: fixed;
      z-index: 3;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.72);
      pointer-events: auto;
      opacity: 0;
      transition: opacity 180ms linear;
    }

    #lightbox-overlay[hidden] {
      display: none;
    }

    #lightbox-overlay.visible {
      opacity: 1;
    }

    #lightbox-card {
      width: fit-content;
      max-width: calc(100vw - 48px);
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      background: rgba(198, 191, 181, 0.8);
      color: rgba(18, 18, 18, 0.96);
      backdrop-filter: blur(18px);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.28),
        0 30px 64px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }

    #lightbox-card[data-has-caption="false"] {
      gap: 0;
    }

    #lightbox-image {
      display: block;
      max-width: none;
      max-height: none;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
    }

    #lightbox-caption {
      width: 100%;
      max-width: var(--lightbox-caption-max-width, min(1100px, calc(100vw - 88px)));
      font-size: 15px;
      line-height: 1.45;
      letter-spacing: 0.01em;
      text-align: left;
      overflow-wrap: anywhere;
    }

    #lightbox-caption[hidden] {
      display: none;
    }

    #title-banner {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 4;
      width: 100%;
      height: var(--title-banner-height);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 24px;
      background: rgba(0, 0, 0, 0.5);
      color: rgba(255, 255, 255, 0.94);
      font-size: clamp(20px, 3vw, 34px);
      font-weight: 400;
      letter-spacing: 0.03em;
      text-align: left;
      opacity: 0;
      pointer-events: none;
    }

    #title-banner.visible {
      animation: title-banner-fade 2s linear both;
    }

    @keyframes flip-in {
      0% {
        opacity: 0;
        transform: rotateX(-90deg) scale(0.88);
      }

      60% {
        opacity: 1;
        transform: rotateX(14deg) scale(1.02);
      }

      100% {
        opacity: 1;
        transform: rotateX(0deg) scale(1);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.035);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes title-banner-fade {
      0% {
        opacity: 0;
      }

      12% {
        opacity: 1;
      }

      72% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }
  </style>
  <script>
    const DESKTOP_TILE_SIZE = 250;
    const TABLET_TILE_SIZE = 200;
    const MOBILE_TILE_SIZE = 160;
    const OVERLAY_DISMISS_GUARD_MS = 250;
    const RESIZE_DEBOUNCE_MS = 120;
    const SCROLL_PRELOAD_VIEWPORTS = 2;
    const API_PAGE_SIZE = 40;
    const API_MAX_PAGES = 8;
    const LOOKUP_URL = "https://mastodon.social/api/v1/accounts/lookup";
    const STATION_CONFIGS = {
      alcast: {
        acct: "alcastradio",
        profileUrl: "https://mastodon.social/@alcastradio",
        title: "The Alcast Cover Wall",
        station_label: "The Alcast",
        strip_trailing_hashtags: false
      },
      kvcu: {
        acct: "1190playlist@mastodon.social",
        profileUrl: "https://mastodon.social/@1190playlist@mastodon.social",
        title: "Radio 1190 Cover Wall",
        station_label: "Radio 1190",
        strip_trailing_hashtags: true
      },
      kuvo: {
        acct: "kuvo_playlist",
        profileUrl: "https://mastodon.social/@kuvo_playlist",
        title: "KUVO Cover Wall",
        station_label: "KUVO Jazz",
        strip_trailing_hashtags: true
      },
      kjac: {
        acct: "the_colorado_sound_playlist",
        profileUrl: "https://mastodon.social/@the_colorado_sound_playlist",
        title: "The Colorado Sound Cover Wall",
        station_label: "The Colorado Sound",
        strip_trailing_hashtags: true
      },
      kvoq: {
        acct: "indie1023_playlist",
        profileUrl: "https://mastodon.social/@indie1023_playlist",
        title: "Indie 102.3 Cover Wall",
        station_label: "Indie 102.3",
        strip_trailing_hashtags: false
      }
    };

    let latestArtwork = [];
    let refreshTimer = null;
    let resizeTimer = null;
    let refreshInFlight = false;
    let activeLightboxTile = null;
    let activeLightboxItemId = null;
    let activeLightboxItem = null;
    let activeLightboxShownAt = 0;
    let hasCompletedInitialRender = false;
    let stationAccountPromise = null;
    let nextOlderMaxId = null;
    let hasMoreOlderArtwork = true;
    let isLoadingOlderArtwork = false;
    let titleBannerTimer = null;
    let wasAtTop = true;
    let lastLayoutWidth = 0;

    function getRefreshIntervalMs() {
      return 15000;
    }

    function getStationKey() {
      const params = new URLSearchParams(window.location.search);
      const stationValue = (params.get("station") || "alcast").toLowerCase();
      return STATION_CONFIGS[stationValue] ? stationValue : "alcast";
    }

    function getStationConfig() {
      return STATION_CONFIGS[getStationKey()];
    }

    function applyPageTitle() {
      document.title = getStationConfig().title;
    }

    function applyTitleBannerSizing() {
      document.documentElement.style.setProperty("--title-banner-height", `${Math.max(28, getLayoutMetrics().tileSize * 0.25)}px`);
    }

    function showTitleBanner() {
      const banner = document.getElementById("title-banner");
      window.clearTimeout(titleBannerTimer);
      banner.textContent = getStationConfig().station_label;
      banner.classList.remove("visible");
      void banner.offsetWidth;
      banner.classList.add("visible");
      titleBannerTimer = window.setTimeout(() => {
        banner.classList.remove("visible");
      }, 2000);
    }

    function getInitialBannerDelayMs() {
      const visibleTileCount = getMinimumVisibleCount();
      const stepDelay = getAnimationStepDelay(visibleTileCount);
      const flipDuration = 450;
      return Math.max(0, ((visibleTileCount - 1) * stepDelay) + flipDuration);
    }

    function isTouchLikeDevice() {
      return window.matchMedia("(hover: none), (pointer: coarse)").matches;
    }

    function getLayoutMetrics() {
      const width = Math.max(window.innerWidth, 1);
      let columns;

      if (width <= 640) {
        columns = 3;
      } else if (width <= 1024 || isTouchLikeDevice()) {
        columns = 4;
      } else {
        const fullColumns = Math.max(1, Math.floor(width / DESKTOP_TILE_SIZE));
        const partialVisible = (width - (fullColumns * DESKTOP_TILE_SIZE)) / DESKTOP_TILE_SIZE;

        if (partialVisible > 0.5) {
          columns = fullColumns;
        } else {
          columns = Math.max(1, Math.ceil(width / DESKTOP_TILE_SIZE));
        }
      }

      const tileSize = width / columns;
      return {
        columns,
        rows: Math.max(1, Math.ceil(window.innerHeight / tileSize)),
        tileSize
      };
    }

    function applyResponsiveSizing() {
      document.documentElement.style.setProperty("--tile-size", `${getLayoutMetrics().tileSize}px`);
      applyTitleBannerSizing();
    }

    function shouldRerenderForResize() {
      const widthChanged = Math.abs(window.innerWidth - lastLayoutWidth) > 1;

      if (widthChanged) {
        lastLayoutWidth = window.innerWidth;
        return true;
      }

      return false;
    }

    function withCacheBust(url) {
      const nextUrl = new URL(url);
      nextUrl.searchParams.set("_", String(Date.now()));
      return nextUrl.toString();
    }

    async function getStationAccount() {
      if (stationAccountPromise) {
        return stationAccountPromise;
      }

      stationAccountPromise = (async () => {
        const stationConfig = getStationConfig();
        const nextUrl = new URL(LOOKUP_URL);
        nextUrl.searchParams.set("acct", stationConfig.acct);

        const response = await fetch(withCacheBust(nextUrl.toString()), { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Mastodon account lookup failed");
        }

        return response.json();
      })();

      return stationAccountPromise;
    }

    function buildApiPageUrl(accountId, maxId) {
      const nextUrl = new URL(`https://mastodon.social/api/v1/accounts/${accountId}/statuses`);
      nextUrl.searchParams.set("limit", String(API_PAGE_SIZE));
      nextUrl.searchParams.set("exclude_replies", "true");

      if (maxId) {
        nextUrl.searchParams.set("max_id", maxId);
      }

      return nextUrl.toString();
    }

    function getRssUrl() {
      return `${getStationConfig().profileUrl}.rss`;
    }

    function extractArtworkFromStatuses(statuses) {
      return statuses
        .flatMap((status) => (status.media_attachments || [])
          .filter((media) => media.type === "image")
          .map((media, index) => ({
            id: `${status.id}-${media.id || index}`,
            statusId: status.id,
            createdAt: status.created_at,
            url: media.url || media.preview_url,
            alt: media.description || stripHtml(status.content) || "Album cover artwork",
            text: cleanOverlayText(stripHtml(status.content) || media.description || "Album cover artwork")
          })))
        .filter((item) => item.url);
    }

    function dedupeArtwork(items) {
      const seen = new Set();
      return items.filter((item) => {
        const key = item.url || item.id;

        if (seen.has(key)) {
          return false;
        }

        seen.add(key);
        return true;
      });
    }

    function sortArtworkNewestFirst(items) {
      return [...items].sort((left, right) => {
        const createdCompare = new Date(right.createdAt || 0).getTime() - new Date(left.createdAt || 0).getTime();

        if (createdCompare !== 0) {
          return createdCompare;
        }

        return String(right.statusId || right.id).localeCompare(String(left.statusId || left.id));
      });
    }

    async function fetchStatusesPage(accountId, maxId) {
      const response = await fetch(withCacheBust(buildApiPageUrl(accountId, maxId)), { cache: "no-store" });

      if (!response.ok) {
        throw new Error("Mastodon API request failed");
      }

      return response.json();
    }

    async function fetchArtworkFromApi(minimumCount, startMaxId = null) {
      const account = await getStationAccount();
      const allArtwork = [];
      let maxId = startMaxId;
      let page = 0;
      let lastStatuses = [];

      while (page < API_MAX_PAGES && allArtwork.length < minimumCount) {
        const statuses = await fetchStatusesPage(account.id, maxId);

        if (!statuses.length) {
          break;
        }

        lastStatuses = statuses;
        allArtwork.push(...extractArtworkFromStatuses(statuses));
        maxId = statuses[statuses.length - 1].id;
        page += 1;
      }

      return {
        artwork: sortArtworkNewestFirst(dedupeArtwork(allArtwork)),
        nextMaxId: lastStatuses.length ? lastStatuses[lastStatuses.length - 1].id : maxId,
        hasMore: Boolean(lastStatuses.length)
      };
    }

    async function fetchArtworkFromRss() {
      const response = await fetch(withCacheBust(getRssUrl()), { cache: "no-store" });

      if (!response.ok) {
        throw new Error("Mastodon RSS request failed");
      }

      const rssText = await response.text();
      const xml = new DOMParser().parseFromString(rssText, "application/xml");
      const items = Array.from(xml.querySelectorAll("item"));

      return items
        .map((item, index) => {
          const mediaNode = item.querySelector("media\\:content, content");
          if (!mediaNode) {
            return null;
          }

          return {
            id: item.querySelector("guid")?.textContent?.trim() || `rss-${index}`,
            statusId: item.querySelector("guid")?.textContent?.trim() || `rss-${index}`,
            createdAt: item.querySelector("pubDate")?.textContent?.trim() || "",
            url: mediaNode.getAttribute("url"),
            alt: item.querySelector("media\\:description, description")?.textContent?.trim() || "Album cover artwork",
            text: cleanOverlayText(stripHtml(item.querySelector("description")?.textContent?.trim() || "")
              || item.querySelector("media\\:description, description")?.textContent?.trim()
              || "Album cover artwork")
          };
        })
        .filter((item) => item && item.url)
        .sort((left, right) => new Date(right.createdAt || 0).getTime() - new Date(left.createdAt || 0).getTime());
    }

    function stripHtml(value) {
      const doc = new DOMParser().parseFromString(value || "", "text/html");
      doc.querySelectorAll("br").forEach((node) => {
        node.replaceWith("\n");
      });
      doc.querySelectorAll("p").forEach((node) => {
        if (node.nextSibling) {
          node.append("\n");
        }
      });
      return doc.body.textContent ? doc.body.textContent.replace(/\n{3,}/g, "\n\n").trim() : "";
    }

    function cleanOverlayText(value) {
      if (!getStationConfig().strip_trailing_hashtags) {
        return (value || "").trim();
      }

      const lines = (value || "")
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);

      while (lines.length && /^#/.test(lines[lines.length - 1])) {
        lines.pop();
      }

      if (!lines.length) {
        return "";
      }

      lines[lines.length - 1] = lines[lines.length - 1]
        .replace(/\s+(#[^\s#]+(?:\s+#[^\s#]+)*)\s*$/u, "")
        .trim();

      return lines.join("\n").trim();
    }

    function getMinimumVisibleCount() {
      const { columns, rows } = getLayoutMetrics();
      return columns * rows;
    }

    function mergeArtwork(newerItems, olderItems) {
      return sortArtworkNewestFirst(dedupeArtwork([...newerItems, ...olderItems]));
    }

    function artworkListsMatch(leftItems, rightItems) {
      if (leftItems.length !== rightItems.length) {
        return false;
      }

      return leftItems.every((item, index) => item.id === rightItems[index]?.id);
    }

    function preloadArtwork(items) {
      return Promise.all(items.map((item) => new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve();
        img.onerror = () => resolve();
        img.src = item.url;
      })));
    }

    function syncWallLayout(itemCount) {
      const wall = document.getElementById("wall");
      const { columns } = getLayoutMetrics();

      wall.style.gridTemplateColumns = `repeat(${columns}, minmax(0, 1fr))`;
      wall.style.gridTemplateRows = "";
      wall.style.width = "100%";
      wall.style.height = "auto";
    }

    function createTile(item, index, eagerThreshold = 0) {
      const tile = document.createElement("button");
      tile.className = "tile pending";
      tile.type = "button";
      tile.dataset.itemId = item.id;
      tile.setAttribute("aria-label", item.alt || "Open cover artwork");

      const img = document.createElement("img");
      img.src = item.url;
      img.alt = item.alt;
      img.loading = index < eagerThreshold ? "eager" : "lazy";
      img.decoding = "async";

      tile.appendChild(img);
      attachTileLightboxBehavior(tile, item);
      return tile;
    }

    function isTileVisible(tile) {
      const rect = tile.getBoundingClientRect();
      return rect.bottom > 0 && rect.top < window.innerHeight;
    }

    function isTileNearViewport(tile) {
      const rect = tile.getBoundingClientRect();
      const margin = window.innerHeight * SCROLL_PRELOAD_VIEWPORTS;
      return rect.bottom > -margin && rect.top < window.innerHeight + margin;
    }

    function getAnimationStepDelay(tileCount) {
      const normalizedCount = Math.max(1, tileCount);
      const baselineCount = 8;
      const baselineDelay = 50;

      return Math.max(6, Math.round((baselineDelay * baselineCount) / normalizedCount));
    }

    function animateVisibleTiles(tiles) {
      const visibleTiles = tiles.filter(isTileVisible);
      const stepDelay = getAnimationStepDelay(visibleTiles.length);

      visibleTiles.forEach((tile, index) => {
        window.setTimeout(() => {
          tile.classList.remove("pending");
          tile.classList.add("flip");
        }, index * stepDelay);
      });

      tiles
        .filter((tile) => !isTileVisible(tile))
        .forEach((tile) => {
          tile.classList.remove("pending");
        });
    }

    function animateFirstDisplayTiles(tiles) {
      const visibleTiles = tiles.filter((tile) => tile.dataset.awaitingFirstDisplay === "true" && isTileVisible(tile));
      const stepDelay = getAnimationStepDelay(visibleTiles.length);

      visibleTiles.forEach((tile, index) => {
        window.setTimeout(() => {
          tile.classList.remove("pending");
          tile.classList.add("flip");
          delete tile.dataset.awaitingFirstDisplay;
        }, index * stepDelay);
      });
    }

    function revealPendingTilesInView() {
      const pendingTiles = Array.from(document.querySelectorAll('.tile[data-awaiting-first-display="true"]'));
      animateFirstDisplayTiles(pendingTiles);
    }

    function shouldLoadOlderArtwork() {
      const remaining = document.documentElement.scrollHeight - (window.scrollY + window.innerHeight);
      return remaining < window.innerHeight * 1.5;
    }

    function scheduleRefresh() {
      window.clearTimeout(refreshTimer);
      refreshTimer = window.setTimeout(() => {
        refreshArtwork();
      }, getRefreshIntervalMs());
    }

    function closeLightbox() {
      if (activeLightboxTile) {
        activeLightboxTile.classList.remove("jiggle");
        activeLightboxTile = null;
      }

      activeLightboxItemId = null;
      activeLightboxItem = null;
      activeLightboxShownAt = 0;

      const overlay = document.getElementById("lightbox-overlay");
      overlay.classList.remove("visible");
      overlay.setAttribute("hidden", "");
      document.getElementById("lightbox-image").removeAttribute("src");
      document.getElementById("lightbox-image").alt = "";
      document.getElementById("lightbox-caption").textContent = "";
    }

    function updateLightboxLayout() {
      const card = document.getElementById("lightbox-card");
      const image = document.getElementById("lightbox-image");
      const caption = document.getElementById("lightbox-caption");
      const viewportPadding = 48;
      const cardVerticalChrome = 58;
      const cardHorizontalChrome = 42;
      const availableWidth = Math.max(220, window.innerWidth - viewportPadding - cardHorizontalChrome);
      const availableHeight = Math.max(180, window.innerHeight - viewportPadding - cardVerticalChrome - caption.offsetHeight);
      const naturalWidth = image.naturalWidth || image.clientWidth || 1;
      const naturalHeight = image.naturalHeight || image.clientHeight || 1;
      const scale = Math.min(availableWidth / naturalWidth, availableHeight / naturalHeight);
      const targetWidth = Math.max(220, Math.round(naturalWidth * scale));
      const targetHeight = Math.max(140, Math.round(naturalHeight * scale));

      image.style.width = `${targetWidth}px`;
      image.style.height = `${targetHeight}px`;
      card.style.setProperty("--lightbox-caption-max-width", `${targetWidth}px`);
    }

    function clearActiveTileOnly() {
      if (activeLightboxTile) {
        activeLightboxTile.classList.remove("jiggle");
        activeLightboxTile = null;
      }
    }

    function openLightbox(tile, item) {
      clearActiveTileOnly();

      if (!item?.url) {
        return;
      }

      activeLightboxTile = tile;
      activeLightboxItemId = item.id;
      activeLightboxItem = item;
      activeLightboxShownAt = Date.now();
      activeLightboxTile.classList.add("jiggle");

      const overlay = document.getElementById("lightbox-overlay");
      const overlayImage = document.getElementById("lightbox-image");
      const overlayCaption = document.getElementById("lightbox-caption");
      const overlayCard = document.getElementById("lightbox-card");
      const captionText = (item.text || "").trim();

      overlayImage.src = item.url;
      overlayImage.alt = item.alt || "Album cover artwork";
      overlayCaption.textContent = captionText;
      overlayCaption.hidden = !captionText;
      overlayCard.dataset.hasCaption = captionText ? "true" : "false";
      overlay.removeAttribute("hidden");
      updateLightboxLayout();

      window.requestAnimationFrame(() => {
        overlay.classList.add("visible");
      });
    }

    function toggleLightbox(tile, item, event = null) {
      if (event) {
        event.stopPropagation();
      }

      if (activeLightboxItemId === item.id) {
        closeLightbox();
        return;
      }

      openLightbox(tile, item);
    }

    function attachTileLightboxBehavior(tile, item) {
      tile.addEventListener("click", (event) => {
        toggleLightbox(tile, item, event);
      });
    }

    async function renderArtwork(items) {
      const wall = document.getElementById("wall");
      const { columns } = getLayoutMetrics();
      const shouldWaitForInitialLoad = !hasCompletedInitialRender;
      const preservedLightboxItem = activeLightboxItem;

      if (shouldWaitForInitialLoad) {
        await preloadArtwork(items.slice(0, getMinimumVisibleCount()));
      }

      syncWallLayout(items.length);
      clearActiveTileOnly();

      const fragment = document.createDocumentFragment();

      items.forEach((item, index) => {
        fragment.appendChild(createTile(item, index, columns * 2));
      });

      wall.replaceChildren(fragment);

      if (preservedLightboxItem?.id) {
        const nextLightboxTile = wall.querySelector(`[data-item-id="${CSS.escape(preservedLightboxItem.id)}"]`);

        if (nextLightboxTile) {
          openLightbox(nextLightboxTile, preservedLightboxItem);
        } else {
          closeLightbox();
        }
      }

      window.requestAnimationFrame(() => {
        animateVisibleTiles(Array.from(wall.querySelectorAll(".tile")));
      });

      hasCompletedInitialRender = true;
    }

    async function appendOlderArtwork(items) {
      if (!items.length) {
        return;
      }

      const wall = document.getElementById("wall");
      const fragment = document.createDocumentFragment();
      const startingIndex = wall.children.length;
      const appendedTiles = [];

      items.forEach((item, index) => {
        const tile = createTile(item, startingIndex + index);
        tile.dataset.awaitingFirstDisplay = "true";
        appendedTiles.push(tile);
        fragment.appendChild(tile);
      });

      wall.appendChild(fragment);
      syncWallLayout(latestArtwork.length);

      const nearViewportItems = items.filter((_, index) => isTileNearViewport(appendedTiles[index]));

      if (nearViewportItems.length) {
        await preloadArtwork(nearViewportItems);
      }

      revealPendingTilesInView();
    }

    async function loadInitialArtwork() {
      try {
        const minimumCount = getMinimumVisibleCount();
        const apiResult = await fetchArtworkFromApi(minimumCount);

        latestArtwork = apiResult.artwork;
        nextOlderMaxId = apiResult.nextMaxId;
        hasMoreOlderArtwork = apiResult.hasMore;
      } catch (apiError) {
        latestArtwork = await fetchArtworkFromRss();
        nextOlderMaxId = null;
        hasMoreOlderArtwork = false;
      }

      await renderArtwork(latestArtwork);
    }

    async function loadOlderArtwork() {
      if (isLoadingOlderArtwork || refreshInFlight || !hasMoreOlderArtwork || !nextOlderMaxId) {
        return;
      }

      isLoadingOlderArtwork = true;

      try {
        const apiResult = await fetchArtworkFromApi(getMinimumVisibleCount(), nextOlderMaxId);
        nextOlderMaxId = apiResult.nextMaxId;
        hasMoreOlderArtwork = apiResult.hasMore;

        if (apiResult.artwork.length) {
          const existingIds = new Set(latestArtwork.map((item) => item.id));
          const olderUniqueArtwork = apiResult.artwork.filter((item) => !existingIds.has(item.id));
          latestArtwork = mergeArtwork(latestArtwork, olderUniqueArtwork);
          await appendOlderArtwork(olderUniqueArtwork);

          if (shouldLoadOlderArtwork() && hasMoreOlderArtwork) {
            loadOlderArtwork();
          }
        } else if (!apiResult.hasMore) {
          hasMoreOlderArtwork = false;
        }
      } catch (error) {
        return;
      } finally {
        isLoadingOlderArtwork = false;
      }
    }

    async function refreshArtwork() {
      if (refreshInFlight) {
        return;
      }

      refreshInFlight = true;

      try {
        if (!latestArtwork.length) {
          await loadInitialArtwork();
          return;
        }

        try {
          const apiResult = await fetchArtworkFromApi(getMinimumVisibleCount());
          const mergedArtwork = mergeArtwork(apiResult.artwork, latestArtwork);

          if (!nextOlderMaxId && apiResult.nextMaxId) {
            nextOlderMaxId = apiResult.nextMaxId;
            hasMoreOlderArtwork = apiResult.hasMore;
          }

          if (!artworkListsMatch(mergedArtwork, latestArtwork)) {
            latestArtwork = mergedArtwork;
            await renderArtwork(latestArtwork);
          }
        } catch (apiError) {
          const rssArtwork = await fetchArtworkFromRss();
          const mergedArtwork = mergeArtwork(rssArtwork, latestArtwork);

          if (!artworkListsMatch(mergedArtwork, latestArtwork)) {
            latestArtwork = mergedArtwork;
            await renderArtwork(latestArtwork);
          }
        }

        if (!latestArtwork.length) {
          throw new Error("No artwork found in the Mastodon feed");
        }
      } catch (error) {
        if (latestArtwork.length) {
          await renderArtwork(latestArtwork);
        }
      } finally {
        refreshInFlight = false;
        scheduleRefresh();
      }
    }

    function handleResize() {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(() => {
        applyResponsiveSizing();
        if (latestArtwork.length && shouldRerenderForResize()) {
          renderArtwork(latestArtwork);
        }
        if (activeLightboxItemId) {
          updateLightboxLayout();
        }
        revealPendingTilesInView();
      }, RESIZE_DEBOUNCE_MS);
    }

    function start() {
      applyResponsiveSizing();
      lastLayoutWidth = window.innerWidth;
      applyPageTitle();
      refreshArtwork();
      window.setTimeout(() => {
        showTitleBanner();
      }, getInitialBannerDelayMs());
      window.addEventListener("resize", handleResize);
      window.addEventListener("scroll", () => {
        scheduleRefresh();
        if (shouldLoadOlderArtwork()) {
          loadOlderArtwork();
        }
        revealPendingTilesInView();
        const isAtTop = window.scrollY <= 0;

        if (isAtTop && !wasAtTop) {
          showTitleBanner();
        }

        wasAtTop = isAtTop;
      }, { passive: true });
      document.getElementById("lightbox-overlay").addEventListener("click", () => {
        if ((Date.now() - activeLightboxShownAt) < OVERLAY_DISMISS_GUARD_MS) {
          return;
        }
        closeLightbox();
      });
      document.getElementById("lightbox-card").addEventListener("click", (event) => {
        event.stopPropagation();
      });
      document.getElementById("lightbox-image").addEventListener("load", updateLightboxLayout);
    }

    window.addEventListener("DOMContentLoaded", start);
  </script>
</head>
<body>
  <div id="wall" aria-live="polite"></div>
  <div id="title-banner" aria-hidden="true"></div>
  <div id="lightbox-overlay" hidden>
    <div id="lightbox-card">
      <img id="lightbox-image" alt="">
      <div id="lightbox-caption"></div>
    </div>
  </div>
</body>
</html>
